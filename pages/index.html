<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mental Wellness Tracker</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .landing-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .landing-header h1 { font-size: 20px; color: white; margin: 0; }
        .landing-header a { color: white; text-decoration: none; font-size: 14px; }
        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-container { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 600; color: #888; transition: 0.3s; }
        .tab.active { color: #667eea; border-bottom: 3px solid #667eea; margin-bottom: -2px; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        footer { background: #2d3748; color: #a0aec0; text-align: center; padding: 16px; font-size: 13px; }
    </style>
</head>
<body>

<div class="landing-header">
    <h1>🧠 Mental Wellness Tracker</h1>
    <a href="landing.html">← Back to Home</a>
</div>

<main>
    <div class="auth-container">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login', this)">Login</div>
            <div class="tab" onclick="switchTab('register', this)">Register</div>
        </div>

        <div class="form-section active" id="login">
            <h2>Welcome Back 👋</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
    <label>Password</label>
    <div style="position:relative">
        <input type="password" id="loginPassword" placeholder="Enter your password" style="padding-right:40px;margin-bottom:0">
        <span onclick="togglePassword('loginPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:#718096;user-select:none">👁️</span>
    </div>
</div>
            <button class="btn" style="width:100%" onclick="login()">Login</button>
            <div class="message" id="loginMsg"></div>
        </div>

        <div class="form-section" id="register">
            <h2>Create Account 🌱</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
    <label>Password</label>
    <div style="position:relative">
        <input type="password" id="regPassword" placeholder="Create a password" style="padding-right:40px;margin-bottom:0">
        <span onclick="togglePassword('regPassword', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:16px;color:#718096;user-select:none">👁️</span>
    </div>
</div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="regAge" placeholder="Enter your age">
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select id="regGender">
                    <option value="">Select gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button class="btn" style="width:100%" onclick="register()">Register</button>
            <div class="message" id="registerMsg"></div>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 Mental Wellness Tracker | All Rights Reserved</p>
</footer>

<script src="../js/auth.js"></script>
<script>
    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        el.classList.add('active');
    }
function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
    } else {
        input.type = 'password';
        icon.textContent = '👁️';
    }
}
</script>
</body>
</html>
